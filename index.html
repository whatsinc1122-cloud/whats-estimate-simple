<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f3f4f6; color: #111827; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .section-title { font-size: 15px; font-weight: 600; color: #1f2937; border-bottom: 1px solid #f3f4f6; padding-bottom: 12px; margin-bottom: 18px; }
  .field { margin-bottom: 18px; }
  .label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .required { color: #ef4444; }
  .input-wrap { position: relative; }
  .input-wrap input[type="number"] { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 9px 40px 9px 12px; font-size: 14px; outline: none; transition: border-color .2s; }
  .input-wrap input[type="number"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .input-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #9ca3af; pointer-events: none; }
  .text-input { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; transition: border-color .2s; }
  .text-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-group.col3 .btn-opt { flex: 1 1 calc(33% - 6px); min-width: 80px; }
  .btn-group.col2 .btn-opt { flex: 1 1 calc(50% - 4px); }
  .btn-group.col4 .btn-opt { flex: 1 1 calc(25% - 6px); min-width: 70px; }
  .btn-opt { padding: 8px 6px; border: 1.5px solid #d1d5db; border-radius: 9px; background: #fff; font-size: 12px; font-weight: 500; color: #4b5563; cursor: pointer; transition: all .15s; text-align: center; line-height: 1.3; }
  .btn-opt:hover { border-color: #3b82f6; color: #3b82f6; }
  .btn-opt.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  select { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; background: #fff; color: #111827; }
  select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .grid2 { grid-template-columns: 1fr; } }
  .submit-btn { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 4px; }
  .submit-btn:hover { background: #1d4ed8; }
  .submit-btn:active { transform: scale(.99); }
  .excel-btn { width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
  .excel-btn:hover { background: #17866300; background: #15845f; }
  .excel-btn:active { transform: scale(.99); }
  .excel-btn svg { width: 18px; height: 18px; }
  .result-header { background: linear-gradient(135deg, #1d4ed8, #2563eb); border-radius: 14px; padding: 24px; color: #fff; margin-bottom: 20px; }
  .result-header h2 { font-size: 14px; opacity: .85; margin-bottom: 16px; }
  .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (min-width: 540px) { .result-grid { grid-template-columns: repeat(4, 1fr); } }
  .result-item-label { font-size: 11px; opacity: .75; margin-bottom: 3px; }
  .result-item-value { font-size: 18px; font-weight: 700; }
  .result-item-value.large { font-size: 22px; }
  .result-item-value span { font-size: 12px; font-weight: 400; }
  .result-meta { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.2); display: flex; flex-wrap: wrap; gap: 8px; }
  .result-tag { font-size: 11px; opacity: .8; background: rgba(255,255,255,.15); padding: 3px 8px; border-radius: 20px; }
  .breakdown-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .breakdown-table th { background: #f9fafb; color: #6b7280; font-weight: 500; padding: 8px 10px; text-align: right; border-bottom: 1px solid #f3f4f6; white-space: nowrap; }
  .breakdown-table th:first-child { text-align: left; }
  .breakdown-table td { padding: 8px 10px; border-bottom: 1px solid #f9fafb; text-align: right; }
  .breakdown-table td:first-child { text-align: left; font-weight: 500; color: #374151; }
  .breakdown-table tr:nth-child(even) td { background: #fafafa; }
  .breakdown-table tfoot td { font-weight: 700; background: #eff6ff; color: #1d4ed8; border-top: 2px solid #dbeafe; }
  .bar { display: inline-block; width: 48px; height: 6px; background: #e5e7eb; border-radius: 3px; vertical-align: middle; margin-right: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: #3b82f6; border-radius: 3px; }
  .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .case-grid { grid-template-columns: 1fr; } }
  .case-card { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 14px; }
  .case-badge { display: inline-block; font-size: 11px; font-weight: 600; color: #2563eb; background: #eff6ff; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .case-name { font-size: 13px; font-weight: 600; color: #1f2937; margin-bottom: 8px; }
  .case-vals { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .case-val-label { font-size: 11px; color: #9ca3af; }
  .case-val { font-size: 13px; font-weight: 600; color: #1f2937; }
  .disclaimer { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 14px; font-size: 12px; color: #92400e; line-height: 1.7; }
  #result { display: none; }
  #result.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>内装工事 概算見積もり</h1>
  <p class="subtitle">条件を入力すると、過去の施工事例から概算金額を算出します</p>

  <!-- Excel出力用：顧客情報 -->
  <div class="card">
    <div class="section-title">見積書情報（Excel出力用）</div>
    <div class="grid2">
      <div class="field">
        <label class="label">顧客名</label>
        <input type="text" id="customer-name" class="text-input" placeholder="株式会社〇〇　様">
      </div>
      <div class="field">
        <label class="label">店舗名</label>
        <input type="text" id="store-name" class="text-input" placeholder="〇〇店">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">基本情報</div>

    <div class="field">
      <label class="label">業態</label>
      <div class="btn-group col3" id="biz-group">
        <button class="btn-opt active" data-val="beauty" onclick="setBtn('biz-group',this)">美容室</button>
        <button class="btn-opt" data-val="nail" onclick="setBtn('biz-group',this)">アイサロン・ネイルサロン</button>
        <button class="btn-opt" data-val="other-biz" onclick="setBtn('biz-group',this)">その他</button>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label class="label">坪数 <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="number" id="tsubo" value="20" min="5" max="200" step="0.5">
          <span class="input-unit">坪</span>
        </div>
      </div>
      <div class="field">
        <label class="label">天井高</label>
        <div class="input-wrap">
          <input type="number" id="ceiling" value="2.4" min="2.0" max="5.0" step="0.1">
          <span class="input-unit">m</span>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="label">工事条件</label>
      <div class="btn-group col4" id="cond-group">
        <button class="btn-opt active" data-val="skeleton" onclick="setBtn('cond-group',this)">スケルトン</button>
        <button class="btn-opt" data-val="uke-large" onclick="setBtn('cond-group',this)">居抜き（大規模）</button>
        <button class="btn-opt" data-val="uke-small" onclick="setBtn('cond-group',this)">居抜き（軽微）</button>
        <button class="btn-opt" data-val="partial" onclick="setBtn('cond-group',this)">部分改装</button>
      </div>
    </div>

    <div class="field">
      <label class="label">エリア</label>
      <div class="btn-group col3" id="area-group">
        <button class="btn-opt active" data-val="tokyo-city" onclick="setBtn('area-group',this)">東京都心</button>
        <button class="btn-opt" data-val="tokyo-sub" onclick="setBtn('area-group',this)">東京郊外</button>
        <button class="btn-opt" data-val="kanagawa" onclick="setBtn('area-group',this)">神奈川・埼玉・千葉</button>
        <button class="btn-opt" data-val="other" onclick="setBtn('area-group',this)">その他</button>
        <button class="btn-opt" data-val="gunma" onclick="setBtn('area-group',this)">群馬・その他</button>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label class="label">セット面数</label>
        <div class="input-wrap">
          <input type="number" id="seats" value="4" min="1" max="30">
          <span class="input-unit">面</span>
        </div>
      </div>
      <div class="field">
        <label class="label">解体工事</label>
        <div class="btn-group col2" id="demo-group">
          <button class="btn-opt" data-val="yes" onclick="setBtn('demo-group',this)">あり</button>
          <button class="btn-opt active" data-val="no" onclick="setBtn('demo-group',this)">なし</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">仕上げ・設備</div>

    <div class="field">
      <label class="label">床仕上げ</label>
      <div class="btn-group col3" id="floor-group">
        <button class="btn-opt active" data-val="floor-tile" onclick="setBtn('floor-group',this)">フロアタイル</button>
        <button class="btn-opt" data-val="ceramic" onclick="setBtn('floor-group',this)">磁器タイル</button>
        <button class="btn-opt" data-val="other-floor" onclick="setBtn('floor-group',this)">その他</button>
      </div>
    </div>

    <div class="field">
      <label class="label">壁・天井仕上げ</label>
      <select id="wall">
        <option value="cloth">クロス（壁紙）</option>
        <option value="paint">塗装仕上げ</option>
        <option value="mortar">モルタル・左官</option>
        <option value="wood">木材・板張り</option>
      </select>
    </div>

    <div class="grid2">
      <div class="field">
        <label class="label">照明</label>
        <div class="btn-group col2" id="light-group">
          <button class="btn-opt" data-val="stage" onclick="setBtn('light-group',this)">演出照明</button>
          <button class="btn-opt active" data-val="standard" onclick="setBtn('light-group',this)">標準</button>
        </div>
      </div>
      <div class="field">
        <label class="label">造作家具</label>
        <div class="btn-group col3" id="furn-group">
          <button class="btn-opt" data-val="many" onclick="setBtn('furn-group',this)">多め</button>
          <button class="btn-opt active" data-val="standard" onclick="setBtn('furn-group',this)">標準</button>
          <button class="btn-opt" data-val="few" onclick="setBtn('furn-group',this)">少なめ</button>
        </div>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label class="label">空調</label>
        <div class="btn-group" id="ac-group" style="flex-direction:column;gap:6px;">
          <button class="btn-opt active" data-val="multi" onclick="setBtn('ac-group',this)">業務用マルチ</button>
          <button class="btn-opt" data-val="home" onclick="setBtn('ac-group',this)">家庭用複数台</button>
          <button class="btn-opt" data-val="reuse" onclick="setBtn('ac-group',this)">既存流用</button>
        </div>
      </div>
      <div class="field">
        <label class="label">看板工事</label>
        <div class="btn-group col2" id="sign-group">
          <button class="btn-opt" data-val="yes" onclick="setBtn('sign-group',this)">あり</button>
          <button class="btn-opt active" data-val="no" onclick="setBtn('sign-group',this)">なし</button>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="calculate()">概算見積もりを計算する</button>
  </div>

  <div id="result">
    <div class="result-header">
      <h2>概算見積もり結果</h2>
      <div class="result-grid">
        <div>
          <div class="result-item-label">概算総額（税別）</div>
          <div class="result-item-value large" id="r-total"></div>
        </div>
        <div>
          <div class="result-item-label">坪単価</div>
          <div class="result-item-value" id="r-per-tsubo"></div>
        </div>
        <div>
          <div class="result-item-label">設計費目安</div>
          <div class="result-item-value" id="r-design"></div>
        </div>
        <div>
          <div class="result-item-label">税込総額（10%）</div>
          <div class="result-item-value" id="r-tax"></div>
        </div>
      </div>
      <div class="result-meta" id="r-meta"></div>
    </div>

    <div class="card">
      <div class="section-title">工事項目別内訳</div>
      <div style="overflow-x:auto;">
        <table class="breakdown-table">
          <thead>
            <tr>
              <th>項目</th>
              <th>金額</th>
              <th>構成比</th>
              <th>坪単価</th>
            </tr>
          </thead>
          <tbody id="breakdown-body"></tbody>
          <tfoot id="breakdown-foot"></tfoot>
        </table>
      </div>
      <!-- Excel出力ボタン -->
      <button class="excel-btn" onclick="generateExcel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        見積書をExcelで出力
      </button>
    </div>

    <div class="card">
      <div class="section-title">類似施工事例（参考）</div>
      <div class="case-grid" id="case-grid"></div>
    </div>

    <div class="disclaimer">
      ※ この見積もりは過去の施工事例をもとにした概算です。実際の工事費用は現地調査・詳細設計により変動します。
      正確な見積もりは担当者にご相談ください。
    </div>
  </div>
</div>

  let s = 0;
  if (c.biz === inp.biz) s += 30;           // 業態一致 +30pt

  const furn = getActive('furn-group');
  const ac = getActive('ac-group');
  const sign = getActive('sign-group') === 'yes';

  const inp = { tsubo, ceiling, cond, area, biz, demo, floor, light, furn, ac, sign };

  const scored = CASES.map(c => ({ ...c, score: scoreCase(c, inp) })).sort((a,b) => b.score - a.score);
  const top4 = scored.slice(0, 4);
  const totalScore = top4.reduce((s, c) => s + c.score, 0);

  const areaM = { 'tokyo-city':1.15, 'tokyo-sub':1.0, 'kanagawa':0.92, 'gunma':0.85, 'other':0.88 }[area] || 1.0;
  const condM = { 'skeleton':1.0, 'uke-large':0.75, 'uke-small':0.45, 'partial':0.6 }[cond] || 1.0;
  const ceilM = ceiling > 2.7 ? 1.08 : 1.0;
  const floorM = floor === 'ceramic' ? 1.12 : 1.0;
  const furnM = { many:1.15, standard:1.0, few:0.85 }[furn] || 1.0;
  const acM = { multi:1.2, home:0.9, reuse:0.3 }[ac] || 1.0;
  const lightM = light === 'stage' ? 1.25 : 1.0;

  // Compute all item amounts (including zeros) for Excel
  const itemAmounts = {};
  const allBreakdown = ITEM_NAMES.map(name => {
    let wUnit = 0;
    for (const c of top4) {
      const w = totalScore > 0 ? c.score / totalScore : 1 / top4.length;
      wUnit += (c.items[name] || 0) * w;
    }
    if (name === '空調') wUnit *= acM;
    if (name === '照明') wUnit *= lightM;
    if (name === '家具') wUnit *= furnM;
    if (name === 'タイル' || name === '床下地') wUnit *= floorM;
    if (name === '解体' && !demo) wUnit = 0;
    const amount = Math.round(wUnit * tsubo * areaM * condM * ceilM);
    itemAmounts[name] = amount;
    const caseVals = CASES.map(c => c.items[name]).filter(v => v > 0);
    const minV = caseVals.length ? Math.min(...caseVals) : 0;
    const maxV = caseVals.length ? Math.max(...caseVals) : 0;
    const range = caseVals.length ? `${Math.round(minV).toLocaleString()}〜${Math.round(maxV).toLocaleString()}円/坪` : 'データなし';
    return { name, amount, range };
  });

  const breakdown = allBreakdown.filter(b => b.amount > 0).sort((a,b) => b.amount - a.amount);
  const totalEx = breakdown.reduce((s,b) => s + b.amount, 0);
  const perTsubo = Math.round(totalEx / tsubo);
  const designFee = Math.round(totalEx * 0.08);
  const totalTax = Math.round(totalEx * 1.1);
  const taxAmount = totalTax - totalEx;

  // Store for Excel export
  lastResult = { itemAmounts, totalEx, totalTax, taxAmount, designFee, tsubo };

  // Update summary
  document.getElementById('r-total').innerHTML = fmt(totalEx);
  document.getElementById('r-per-tsubo').innerHTML = fmt(perTsubo) + '<span>/坪</span>';
  document.getElementById('r-design').innerHTML = fmt(designFee);
  document.getElementById('r-tax').innerHTML = fmt(totalTax);

  const condLabels = { skeleton:'スケルトン', 'uke-large':'居抜き（大規模）', 'uke-small':'居抜き（軽微）', partial:'部分改装' };
  const areaLabels = { 'tokyo-city':'東京都心', 'tokyo-sub':'東京郊外', kanagawa:'神奈川・埼玉・千葉', other:'その他', gunma:'群馬・その他' };
  const bizLabels = { beauty:'美容室', nail:'アイサロン・ネイルサロン', 'other-biz':'その他' };
  const acLabels = { multi:'業務用マルチ', home:'家庭用複数台', reuse:'既存流用' };
  const lightLabels = { stage:'演出照明', standard:'標準照明' };
  const furnLabels = { many:'家具多め', standard:'家具標準', few:'家具少なめ' };

  document.getElementById('r-meta').innerHTML = [
    tsubo + '坪', '天井高 ' + ceiling + 'm',
    bizLabels[biz], condLabels[cond], areaLabels[area],
    acLabels[ac], lightLabels[light], furnLabels[furn]
  ].map(t => `<span class="result-tag">${t}</span>`).join('');

  // Breakdown table
  const tbody = document.getElementById('breakdown-body');
  tbody.innerHTML = breakdown.map(b => {
    const ratio = totalEx > 0 ? (b.amount / totalEx * 100).toFixed(1) : '0';
    const perT = Math.round(b.amount / tsubo).toLocaleString();
    const pct = Math.min(parseFloat(ratio) * 2, 100);
    return `<tr>
      <td>${b.name}</td>
      <td>${fmt(b.amount)}</td>
      <td><span class="bar"><span class="bar-fill" style="width:${pct}%"></span></span>${ratio}%</td>
      <td>¥${perT}</td>
    </tr>`;
  }).join('');

  document.getElementById('breakdown-foot').innerHTML = `<tr>
    <td>合計（税別）</td>
    <td>${fmt(totalEx)}</td>
    <td>100%</td>
    <td>${fmt(perTsubo)}/坪</td>
  </tr>`;

  // Similar cases
  document.getElementById('case-grid').innerHTML = top4.map((c, i) => `
    <div class="case-card">
      <span class="case-badge">#${i+1} スコア ${Math.round(c.score)}</span>
      <div class="case-name">${c.name}</div>
      <div class="case-vals">
        <div>
          <div class="case-val-label">総工事費</div>
          <div class="case-val">${fmt(c.total)}</div>
        </div>
        <div>
          <div class="case-val-label">坪単価</div>
          <div class="case-val">${fmt(Math.round(c.total/c.tsubo))}/坪</div>
        </div>
      </div>
    </div>`).join('');

  const resultEl = document.getElementById('result');
  resultEl.classList.add('show');
  setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function generateExcel() {
  if (!lastResult) { alert('先に見積もりを計算してください'); return; }

  const { itemAmounts, totalEx, totalTax, taxAmount, designFee, tsubo } = lastResult;
  const customerName = document.getElementById('customer-name').value || '　';
  const storeName = document.getElementById('store-name').value || '　';

  const btn = document.querySelector('.excel-btn');
  btn.disabled = true;
  btn.textContent = '出力中...';

  fetch('https://whats-estimate.vercel.app/api/export-excel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      customerName,
      storeName,
      tsubo,
      items: itemAmounts,
      totalExTax: totalEx,
      tax: taxAmount,
      totalIncTax: totalTax,
      designFee
    })
  })
  .then(res => {
    if (!res.ok) throw new Error('Export failed: ' + res.status);
    return res.blob();
  })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const today = new Date();
    const fileDate = today.getFullYear() +
      String(today.getMonth() + 1).padStart(2, '0') +
      String(today.getDate()).padStart(2, '0');
    const storeSafe = (storeName || 'estimate').replace(/[\s/\\:*?"<>|]/g, '_');
    a.download = `見積書_${storeSafe}_${fileDate}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
  })
  .catch(err => {
    alert('Excel出力に失敗しました。\n' + err.message);
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>見積書をExcelで出力';
  });
}
</script>
